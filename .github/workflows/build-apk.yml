name: Собрать APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Кнопка "запустить вручную" на GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать код из репозитория
        uses: actions/checkout@v4

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Кэшировать Gradle (ускоряет повторные сборки)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}

      - name: Дать права на запуск Gradle
        run: chmod +x gradlew

      - name: Собрать debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Загрузить APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: EisenhowerMatrix-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
